openapi: 3.0.3
info:
  title: Task CRUD POC API
  version: 1.0.0
  description: Simple HTTP API for managing tasks in the POC.
servers:
  - url: http://localhost:8080
paths:
  /api/tasks:
    get:
      summary: List tasks
      operationId: listTasks
      responses:
        "200":
          description: Tasks listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResponse"
    post:
      summary: Create a task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
      responses:
        "201":
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      summary: Get task detail
      operationId: getTask
      responses:
        "200":
          description: Task found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update editable task fields
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
      responses:
        "200":
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a task
      operationId: deleteTask
      responses:
        "204":
          description: Task deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
  /api/tasks/{id}/complete:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    patch:
      summary: Mark a task as completed
      operationId: completeTask
      responses:
        "200":
          description: Task marked as completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  schemas:
    TaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          description: Required task title after trimming whitespace.
          example: Comprar leche
        description:
          type: string
          nullable: true
          example: Pasar por el supermercado al salir.
    TaskResponse:
      type: object
      required:
        - id
        - title
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: Comprar leche
        description:
          type: string
          nullable: true
          example: Pasar por el supermercado al salir.
        status:
          type: string
          enum:
            - PENDING
            - COMPLETED
          example: PENDING
        createdAt:
          type: string
          format: date-time
          example: "2026-04-19T10:15:30Z"
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Task not found
        errors:
          type: array
          items:
            type: string
          example:
            - title must not be blank
  responses:
    ValidationError:
      description: Request data is invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Task does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
