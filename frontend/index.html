<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task CRUD POC</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b6b61'/%3E%3Cpath d='M9 16l4 4 10-11' fill='none' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="workspace__intro">
          <p class="eyebrow">POC local</p>
          <h1 id="app-title">Lista de tareas</h1>
          <p class="summary">Crea, consulta, edita, completa y elimina tareas desde una interfaz simple.</p>
        </div>

        <form id="task-form" class="task-form" novalidate>
          <input type="hidden" id="task-id" />
          <div class="field">
            <label for="title">Titulo</label>
            <input id="title" name="title" type="text" autocomplete="off" required />
          </div>
          <div class="field">
            <label for="description">Descripcion</label>
            <textarea id="description" name="description" rows="3"></textarea>
          </div>
          <div class="form-actions">
            <button id="submit-button" type="submit">Crear tarea</button>
            <button id="cancel-edit" class="button-secondary" type="button" hidden>Cancelar</button>
          </div>
          <p id="form-message" class="message" role="status"></p>
        </form>

        <section class="task-list-section" aria-labelledby="task-list-title">
          <div class="section-heading">
            <h2 id="task-list-title">Tareas</h2>
            <span id="task-count" class="task-count">0</span>
          </div>
          <ul id="task-list" class="task-list" aria-live="polite"></ul>
          <p id="empty-state" class="empty-state">Todavia no hay tareas.</p>
        </section>
      </section>

      <aside class="detail-panel" aria-labelledby="detail-title">
        <p class="eyebrow">Detalle</p>
        <h2 id="detail-title">Selecciona una tarea</h2>
        <p id="detail-description" class="detail-description">El detalle aparecera aqui.</p>
        <dl class="detail-meta">
          <div>
            <dt>Estado</dt>
            <dd id="detail-status">-</dd>
          </div>
          <div>
            <dt>Creada</dt>
            <dd id="detail-created">-</dd>
          </div>
        </dl>
        <div class="detail-actions">
          <button id="complete-button" type="button" disabled>Completar</button>
          <button id="edit-button" class="button-secondary" type="button" disabled>Editar</button>
          <button id="delete-button" class="button-danger" type="button" disabled>Eliminar</button>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
